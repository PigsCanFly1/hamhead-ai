services:
  postgres:
    image: postgres:15-alpine
    container_name: hamhead-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hamhead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hamheadai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hamhead}']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hamhead-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hamhead}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hamheadai}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: https://ham-headai.com
      NODE_ENV: production
      PORT: 5000
    networks:
      - app-net
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && node prisma/seed.js && node src/index.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: hamhead-client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hamhead-ai_app-net"
      # HTTPS router
      - "traefik.http.routers.hamhead.rule=Host(`ham-headai.com`) || Host(`www.ham-headai.com`)"
      - "traefik.http.routers.hamhead.entrypoints=websecure"
      - "traefik.http.routers.hamhead.tls=true"
      - "traefik.http.routers.hamhead.tls.certresolver=letsencrypt"
      - "traefik.http.services.hamhead.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.hamhead-http.rule=Host(`ham-headai.com`) || Host(`www.ham-headai.com`)"
      - "traefik.http.routers.hamhead-http.entrypoints=web"
      - "traefik.http.routers.hamhead-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
